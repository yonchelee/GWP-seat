<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3.26 GWP 연화담 자리배치도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1210;
  --surface: #181d1a;
  --border: #2a332e;
  --green: #4a7c68;
  --green-light: #c8ddd7;
  --green-dim: #2c4a3e;
  --amber: #c4874a;
  --text: #d8d4cc;
  --text-dim: #6a7870;
  --chair: #3a5c4e;
  --chair-named: #5a9e80;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  padding: 24px 16px 60px;
}

/* ─ 헤더 ─ */
header { text-align:center; margin-bottom:20px; }
header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: #fff; margin-bottom: 4px;
  word-break: keep-all;
}
header p { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

/* ─ 스탯바 ─ */
.stats-bar {
  display: flex; max-width: 680px;
  margin: 0 auto 20px;
  border: 1px solid var(--border);
}
.stat-item {
  flex: 1; padding: 10px 8px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.stat-item:last-child { border-right: none; background: var(--green-dim); }
.stat-num { font-size: 18px; font-weight: 700; color: var(--green-light); line-height: 1; margin-bottom: 2px; }
.stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }

/* ─ 메인 레이아웃 ─
   룸A | 가벽 | 룸B | 가벽 | 홀
   모두 같은 height: SVG height 고정
*/
.layout-row {
  display: flex;
  align-items: flex-start;   /* 상단 정렬 */
  width: 100%;
  max-width: 1500px;
  margin: 0 auto;
  border: 1px solid var(--border);
  overflow-x: auto;
}

/* 각 존 */
.zone {
  background: var(--surface);
  position: relative;
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 8px 24px;
}
.zone.hall { flex: 1.88; }

.zone-label {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  background: var(--green-dim); color: var(--green-light);
  font-size: 9px; font-weight: 600; letter-spacing: 2px;
  padding: 2px 12px; white-space: nowrap;
}
.zone-count {
  position: absolute;
  bottom: 5px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: var(--text-dim); white-space: nowrap;
}
.zone-count span { color: var(--green-light); font-weight: 600; }

/* SVG: 가로 100%, 높이는 viewBox 비율로 자동 */
.room-svg { width: 100%; display: block; }

/* 가벽 */
.wall {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 28px; flex-shrink: 0;
  background: var(--bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  align-self: stretch;
}
.wall-line { flex: 1; border-left: 2px dashed var(--amber); opacity: 0.4; }
.wall-tag {
  font-size: 7px; color: var(--amber);
  border: 1px dashed var(--amber);
  padding: 4px 3px;
  writing-mode: vertical-rl;
  opacity: 0.8; white-space: nowrap;
  margin: 6px 0;
}

/* 의자 */
.chair-rect { cursor: pointer; transition: fill 0.12s; }
.chair-rect:hover { fill: #5a8c7a !important; }
.chair-rect.named { fill: var(--chair-named) !important; }

/* ─ 모달 ─ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #1e2a24; border: 1px solid var(--green);
  padding: 26px 30px; min-width: 290px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.modal h3 { font-size: 13px; color: var(--green-light); margin-bottom: 4px; font-weight: 600; }
.modal p  { font-size: 10px; color: var(--text-dim); margin-bottom: 16px; }
.modal input {
  width: 100%; background: #0f1210; border: 1px solid var(--green);
  color: var(--text); font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 9px 12px; outline: none; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--green-light); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  background: none; border: 1px solid var(--green-light);
  color: var(--green-light); font-size: 10px;
  padding: 5px 14px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-btns button.primary { background: var(--green-dim); }
.modal-btns button:hover   { background: var(--green); }
.modal-btns button.del     { border-color: #c06030; color: #c06030; }
.modal-btns button.del:hover { background: #c06030; color: #fff; }

/* ─ 하단 ─ */
.info-panel {
  max-width: 1500px; margin: 12px auto 0;
  padding: 10px 20px; background: var(--green-dim);
  border: 1px solid var(--green);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
}
.info-text { color: var(--green-light); }
.info-reset {
  background: none; border: 1px solid var(--green-light);
  color: var(--green-light); font-size: 10px;
  padding: 4px 12px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.info-reset:hover { background: var(--green); }

.legend {
  max-width: 1500px; margin: 14px auto 0;
  display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); }
.leg-box { width: 12px; height: 12px; border-radius: 2px; }

#tooltip {
  position: fixed; background: #1e2622;
  border: 1px solid var(--green); color: var(--green-light);
  font-size: 10px; padding: 5px 10px;
  pointer-events: none; display: none; z-index: 100;
}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─────────────────────────────────────────
// ⚠️ 아래 URL을 Firebase 콘솔에서 복사한 값으로 교체하세요
const FIREBASE_URL = 'https://gwp-seat-default-rtdb.asia-southeast1.firebasedatabase.app';
// ─────────────────────────────────────────

const app = initializeApp({ databaseURL: FIREBASE_URL });
const db  = getDatabase(app);
const seatsRef = ref(db, 'seats');

const names = {};
let currentEl = null;

const overlay    = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalSub   = document.getElementById('modal-sub');
const modalInput = document.getElementById('modal-input');
const saveBtn    = document.getElementById('modal-save-btn');
const cancelBtn  = document.getElementById('modal-cancel-btn');
const delBtn     = document.getElementById('modal-del-btn');
const tooltip    = document.getElementById('tooltip');
const infoText   = document.getElementById('info-text');
const sNamed     = document.getElementById('s-named');

function key(el) { return `${el.dataset.zone}-${el.dataset.table}-${el.dataset.seat}`; }
function getLabelEl(el) { return document.getElementById('lbl-' + key(el)); }

function drawLabel(el, name) {
  const old = getLabelEl(el);
  if (old) old.remove();
  if (!name) return;
  const g = el.closest('g') || el.closest('svg');
  const x = +el.getAttribute('x') + +el.getAttribute('width')  / 2;
  const y = +el.getAttribute('y') + +el.getAttribute('height') / 2 + 2;
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('id', 'lbl-' + key(el));
  txt.setAttribute('x', x);
  txt.setAttribute('y', y);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('dominant-baseline', 'middle');
  txt.setAttribute('font-size', el.dataset.zone === 'H' ? '5' : '6.5');
  txt.setAttribute('fill', '#fff');
  txt.setAttribute('pointer-events', 'none');
  txt.textContent = name.length > 5 ? name.slice(0,5) : name;
  g.appendChild(txt);
}

function applyName(k, name) {
  names[k] = name;
  const el = document.querySelector(
    `[data-zone="${k.split('-')[0]}"][data-table="${k.split('-').slice(0,-1).join('-')}"][data-seat="${k.split('-').pop()}"]`
  );
  if (!el) return;
  if (name) {
    el.setAttribute('fill', '#5a9e80');
    el.classList.add('named');
  } else {
    el.setAttribute('fill', '#3a5c4e');
    el.classList.remove('named');
    delete names[k];
  }
  drawLabel(el, name || '');
}

// ── Firebase 실시간 동기화 ──
// 다른 사람이 입력해도 즉시 반영
onValue(seatsRef, (snapshot) => {
  // 기존 라벨 전부 초기화
  document.querySelectorAll('.chair-rect').forEach(el => {
    el.setAttribute('fill', '#3a5c4e');
    el.classList.remove('named');
    const old = getLabelEl(el);
    if (old) old.remove();
  });
  Object.keys(names).forEach(k => delete names[k]);

  const data = snapshot.val() || {};
  Object.entries(data).forEach(([k, name]) => {
    if (name) applyName(k, name);
  });
  updateInfo();
});

// ── 의자 클릭 ──
document.querySelectorAll('.chair-rect').forEach(el => {
  el.addEventListener('mouseenter', () => {
    const z = el.dataset.zone === 'A' ? '룸 A' : el.dataset.zone === 'B' ? '룸 B' : '메인 홀';
    const nm = names[key(el)] ? ` — ${names[key(el)]}` : '';
    tooltip.style.display = 'block';
    tooltip.textContent = `${z} · ${el.dataset.table} · ${el.dataset.seat}번${nm}`;
  });
  el.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 30) + 'px';
  });
  el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  el.addEventListener('click', () => {
    currentEl = el;
    const z = el.dataset.zone === 'A' ? '룸 A' : el.dataset.zone === 'B' ? '룸 B' : '메인 홀';
    modalTitle.textContent = `${z} · ${el.dataset.table} · ${el.dataset.seat}번 좌석`;
    modalSub.textContent   = names[key(el)] ? `현재: ${names[key(el)]}` : '이름을 입력하세요';
    modalInput.value       = names[key(el)] || '';
    overlay.classList.add('open');
    setTimeout(() => modalInput.focus(), 50);
  });
});

// ── 저장 (Firebase에 쓰기) ──
function saveName() {
  if (!currentEl) return;
  const k = key(currentEl);
  const name = modalInput.value.trim();
  const seatRef = ref(db, `seats/${k}`);
  if (name) {
    set(seatRef, name);          // Firebase에 저장 → onValue가 자동 반영
  } else {
    remove(seatRef);             // 빈 이름이면 삭제
  }
  closeModal();
}

// ── 삭제 ──
function deleteName() {
  if (!currentEl) return;
  remove(ref(db, `seats/${key(currentEl)}`));
  closeModal();
}

function closeModal() { overlay.classList.remove('open'); currentEl = null; }

saveBtn.addEventListener('click', saveName);
delBtn.addEventListener('click', deleteName);
cancelBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
  if (e.key === 'Escape') closeModal();
});

// ── 전체 초기화 ──
document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('모든 이름을 초기화할까요?')) return;
  await remove(seatsRef);  // Firebase 전체 삭제 → onValue가 자동 초기화
});

function updateInfo() {
  const count = Object.keys(names).length;
  sNamed.textContent = count;
  if (!count) { infoText.textContent = '의자를 클릭해 이름을 기입하세요'; return; }
  const preview = Object.values(names).slice(0, 6).join(', ');
  infoText.textContent = `기입 완료 ${count}석 — ${preview}${count > 6 ? ' …' : ''}`;
}
</script>
</body>
</html>
